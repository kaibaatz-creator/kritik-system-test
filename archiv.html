<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archiv</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h2>📁 Archiv</h2>

<input id="code" placeholder="Archiv Code">
<button onclick="login()">Login</button>

<div id="app" style="display:none;">
  <div id="liste"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "DEIN_API_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
});

const db = getDatabase(app);

window.login = async function() {
  const input = document.getElementById("code").value;

  const snap = await get(ref(db, "test/settings/archivePassword"));
  const pw = snap.val();

  if (input == pw) {
    document.getElementById("app").style.display = "block";
    load();
  } else {
    alert("Falscher Code");
  }
}

function load() {
  onValue(ref(db, "test/feedback"), (snap) => {
    const data = snap.val();
    const liste = document.getElementById("liste");
    liste.innerHTML = "";

    for (let key in data) {
      const i = data[key];
      liste.innerHTML += `<div>${i.type}: ${i.text}</div>`;
    }
  });
}
</script>

</body>
</html>
