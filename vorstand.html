<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

.orange{background:orange;color:black;}
.red{background:red;color:white;}
.white{background:#ddd;color:black;}

.msg{
  background:#1e1e1e;
  margin:10px auto;
  padding:14px;
  border-radius:14px;
  text-align:left;
  width:92%;
  max-width:700px;
}

.msg.Kritik{border-left:4px solid #ff4444;color:#ff4444;}
.msg.Lob{border-left:4px solid #00ff99;color:#00ff99;}
.msg.Frage{border-left:4px solid #00bfff;color:#00bfff;}
.msg.Vorschlag{border-left:4px solid #ffaa00;color:#ffaa00;}

.legend span{margin:0 8px;font-weight:bold;}
.kritik{color:#ff4444;}
.lob{color:#00ff99;}
.frage{color:#00bfff;}
.vorschlag{color:#ffaa00;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="logo.png" class="logo">
  <h2>👑 Vorstand Login</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Passwort"><br><br>

  <button onclick="login()">Login</button>
</div>

<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let all = [];
let filter = "Alle";

// LOGIN
function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .catch(e => alert(e.message));
}

// AUTO LOGIN
firebase.auth().onAuthStateChanged(user=>{
  if(user) start();
});

// START
function start(){

  document.getElementById("login").style.display="none";

  document.getElementById("app").innerHTML = `
    <img src="logo.png" class="logo">

    <h2>👑 Vorstand</h2>

    <button class="orange" onclick="newMemberPassword()">Mitglieder Passwort</button>
    <button class="orange" onclick="newArchivePassword()">Archiv Passwort</button>

    <br>

    <button class="red" onclick="kickMembers()">Mitglieder kicken</button>
    <button class="red" onclick="kickAdmins()">Vorstand kicken</button>

    <br><br>

    <div class="legend">
      <span class="kritik">■ Kritik</span>
      <span class="lob">■ Lob</span>
      <span class="frage">■ Frage</span>
      <span class="vorschlag">■ Vorschlag</span>
    </div>

    <br>

    <button class="white" onclick="setFilter('Alle')">Alle</button>
    <button class="white" onclick="setFilter('Kritik')">Kritik</button>
    <button class="white" onclick="setFilter('Lob')">Lob</button>
    <button class="white" onclick="setFilter('Frage')">Frage</button>
    <button class="white" onclick="setFilter('Vorschlag')">Vorschlag</button>

    <br><br>

    <button class="red" onclick="logout()">Logout</button>

    <div id="chat"></div>
  `;

  loadMessages();
}

// FILTER
function setFilter(f){
  filter = f;
  render();
}

// LOAD MESSAGES
function loadMessages(){
  db.ref("test/feedback").on("value", snap=>{
    all = [];
    snap.forEach(c=>{
      all.push({id:c.key,...c.val()});
    });
    render();
  });
}

// RENDER
function render(){
  const chat = document.getElementById("chat");
  chat.innerHTML="";

  all.slice().reverse().forEach(m=>{
    if(filter !== "Alle" && m.type !== filter) return;

    const div=document.createElement("div");
    div.className="msg "+m.type;

    div.innerHTML=`
      <b>${m.type}</b><br>
      ${m.text}<br><br>
      <button class="red" onclick="deleteMsg('${m.id}')">Löschen</button>
    `;

    chat.appendChild(div);
  });
}

// DELETE
function deleteMsg(id){
  db.ref("test/feedback/"+id).remove();
}

// PASSWÖRTER
function newMemberPassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/memberPassword").set(pw);
  db.ref("test/settings/forceLogoutMembers").set(Date.now());
  db.ref("test/members").remove();
}

function newArchivePassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/archivePassword").set(pw);
  db.ref("test/settings/forceLogoutArchive").set(Date.now());
}

// KICK
function kickMembers(){
  db.ref("test/settings/forceLogoutMembers").set(Date.now());
  db.ref("test/members").remove();
}

function kickAdmins(){
  db.ref("test/settings/forceLogoutAdmins").set(Date.now());
  db.ref("test/admins").remove();
}

// LOGOUT
function logout(){
  firebase.auth().signOut().then(()=>location.reload());
}
</script>

</body>
</html>
