<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}
.container{max-width:700px;margin:auto;}
button{padding:10px;border:none;border-radius:10px;margin:5px;cursor:pointer;font-weight:bold;}
.orange{background:orange;color:black;}
.red{background:red;color:white;}
.msg{background:#1e1e1e;margin:10px;padding:14px;border-radius:14px;text-align:left;}
</style>
</head>

<body>

<div id="login">
  <img src="logo.png" class="logo">
  <h2>👑 Vorstand Login</h2>
  <input id="pw">
  <button onclick="login()">Login</button>
  <div id="error" style="color:red;"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let all=[];

function login(){
  const pw=document.getElementById("pw").value;

  db.ref("test/settings/adminPassword").once("value", snap=>{
    if(pw===String(snap.val())){
      localStorage.setItem("adminLoginTime",Date.now());
      start();
    }else{
      document.getElementById("error").innerText="Falsch";
    }
  });
}

if(localStorage.getItem("adminLoginTime")) start();

function start(){

  document.getElementById("login").style.display="none";

  const adminId = localStorage.getItem("adminId") || Date.now();
  localStorage.setItem("adminId",adminId);

  const ref = db.ref("test/admins/"+adminId);
  ref.set(true);
  ref.onDisconnect().remove();

  document.body.innerHTML=`
  <img src="logo.png" class="logo">

  <h2>👑 Vorstand Live</h2>

  <div id="online"></div>

  <button class="orange" onclick="newPassword()">Mitglieder Passwort</button>
  <button class="red" onclick="kickMembers()">Mitglieder kicken</button>

  <div id="chat"></div>
  `;

  loadOnline();
  loadMessages();
}

function loadOnline(){
  db.ref("test/admins").on("value", a=>{
    const admins = a.numChildren();

    db.ref("test/members").on("value", m=>{
      const members = m.numChildren();

      document.getElementById("online").innerText =
        "👑 Vorstand: " + admins + " | 👥 Mitglieder: " + members;
    });
  });
}

function newPassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/memberPassword").set(pw);
}

function kickMembers(){
  db.ref("test/settings/forceLogoutMembers").set(Date.now());
  db.ref("test/members").remove();
}

function loadMessages(){
  db.ref("test/feedback").on("child_added", snap=>{
    const msg={id:snap.key,...snap.val()};
    all.push(msg);
    render();
  });
}

function render(){
  const chat=document.getElementById("chat");
  chat.innerHTML="";

  all.slice().reverse().forEach(m=>{
    const div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <b>${m.type}</b><br>
      ${m.text}
    `;

    chat.appendChild(div);
  });
}
</script>

</body>
</html>
