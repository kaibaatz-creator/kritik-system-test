<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

.logo{
  height:120px;
  margin:30px auto 10px;
  display:block;
}

h2{
  margin-bottom:20px;
  font-weight:500;
  opacity:0.9;
}

.grid{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
  max-width:600px;
  margin:auto;
}

.card{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:#1e1e1e;
  border-radius:20px;
  padding:20px;

  color:white;
  font-size:18px;
  font-weight:bold;

  box-shadow:0 0 10px rgba(0,0,0,0.6);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.admin{border-left:5px solid #ffaa00;}
.archive{border-left:5px solid #00bfff;}

.left{
  display:flex;
  align-items:center;
  gap:15px;
}

button{
  cursor:pointer;
  border:none;
}

.msg{
  background:#1e1e1e;
  margin:10px auto;
  padding:14px;
  border-radius:14px;
  text-align:left;
  width:92%;
  max-width:600px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="logo.png" class="logo">
  <h2>👑 Vorstand Login</h2>

  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Passwort"><br><br>

  <button onclick="login()">Login</button>
</div>

<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let all = [];

// 🔐 LOGIN
function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .catch(e => alert(e.message));
}

// AUTO LOGIN
firebase.auth().onAuthStateChanged(user=>{
  if(user) start();
});

// 🚀 START
function start(){

  document.getElementById("login").style.display="none";

  const app = document.getElementById("app");

  app.innerHTML = `
    <img src="logo.png" class="logo">
    <h2>👑 Vorstand Live</h2>

    <div class="grid">

      <div class="card admin">
        <div class="left">Mitglieder Passwort</div>
        <div id="memberPw"></div>
      </div>

      <div class="card archive">
        <div class="left">Archiv Passwort</div>
        <div id="archivePw"></div>
      </div>

      <div class="card admin" onclick="newMemberPassword()">
        Neues Mitglieder Passwort
      </div>

      <div class="card archive" onclick="newArchivePassword()">
        Neues Archiv Passwort
      </div>

      <div class="card admin" onclick="kickMembers()">
        Mitglieder kicken
      </div>

      <div class="card" onclick="logout()">
        Logout
      </div>

    </div>

    <div id="chat"></div>
  `;

  loadSettings();
  loadMessages();
}

// 🔑 SETTINGS LADEN
function loadSettings(){
  db.ref("test/settings/memberPassword").on("value", snap=>{
    document.getElementById("memberPw").innerText = snap.val();
  });

  db.ref("test/settings/archivePassword").on("value", snap=>{
    document.getElementById("archivePw").innerText = snap.val();
  });
}

// 🔄 PASSWORT ÄNDERN
function newMemberPassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/memberPassword").set(pw);
}

function newArchivePassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/archivePassword").set(pw);
}

// 🚫 KICK
function kickMembers(){
  db.ref("test/members").remove();
}

// 📥 MESSAGES
function loadMessages(){
  db.ref("test/feedback").on("child_added", snap=>{
    const msg = snap.val();
    const div = document.createElement("div");
    div.className="msg";
    div.innerHTML = `<b>${msg.type}</b><br>${msg.text}`;
    document.getElementById("chat").appendChild(div);
  });
}

// 🚪 LOGOUT
function logout(){
  firebase.auth().signOut().then(()=>location.reload());
}
</script>

</body>
</html>
