<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vorstand</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h2>👑 Vorstand</h2>

<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Passwort"><br><br>
<button onclick="login()">Login</button>

<div id="app" style="display:none;">
  <button onclick="newMemberPw()">Mitglieder Passwort neu</button>
  <p id="memberPw"></p>

  <button onclick="newArchivePw()">Archiv Passwort neu</button>
  <p id="archivePw"></p>

  <div id="liste"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
  apiKey: "DEIN_API_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
});

const db = getDatabase(app);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("app").style.display = "block";
      load();
    })
    .catch(() => alert("Login falsch"));
}

function load() {
  onValue(ref(db, "test/feedback"), (snap) => {
    const data = snap.val();
    const liste = document.getElementById("liste");
    liste.innerHTML = "";

    for (let key in data) {
      const i = data[key];
      liste.innerHTML += `<div>${i.type}: ${i.text}</div>`;
    }
  });
}

window.newMemberPw = function() {
  if (!confirm("Neues Passwort?")) return;

  const pw = Math.floor(1000 + Math.random() * 9000);
  set(ref(db, "test/settings/memberPassword"), pw);
  document.getElementById("memberPw").innerText = "Code: " + pw;
}

window.newArchivePw = function() {
  if (!confirm("Neues Archiv Passwort?")) return;

  const pw = Math.floor(1000 + Math.random() * 9000);
  set(ref(db, "test/settings/archivePassword"), pw);
  document.getElementById("archivePw").innerText = "Archiv Code: " + pw;
}
</script>

</body>
</html>
