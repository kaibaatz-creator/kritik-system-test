<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder (Test)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}
.container{max-width:700px;margin:auto;padding:10px;}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}

/* Nachrichten */
.msg{
  background:#1e1e1e;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
  text-align:left;
}

.msg.Kritik{border-left:4px solid #ff4444;color:#ff4444;}
.msg.Lob{border-left:4px solid #00ff99;color:#00ff99;}
.msg.Frage{border-left:4px solid #00bfff;color:#00bfff;}
.msg.Vorschlag{border-left:4px solid #ffaa00;color:#ffaa00;}

button.like{
  background:#222;
  color:white;
  margin-left:10px;
}

.blink{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{box-shadow:0 0 5px currentColor;}
  50%{box-shadow:0 0 20px currentColor;}
  100%{box-shadow:0 0 5px currentColor;}
}

/* Legende */
.legend span{
  margin:0 8px;
  font-weight:bold;
}

#text{
  width: 90%;
  height: 120px;
  border-radius: 10px;
  padding: 10px;
  font-size: 14px;
}
  
.kritik{color:#ff4444;}
.lob{color:#00ff99;}
.frage{color:#00bfff;}
.vorschlag{color:#ffaa00;}
</style>
</head>

<body>

<div id="login">
  <img src="logo.png" class="logo">
  <h2>👥 Mitglieder Login</h2>
  <input id="pw" placeholder="Code">
  <button onclick="login()">Login</button>
  <div id="error" style="color:red;"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let all=[];
let currentFilter="all";
let currentPassword="";

// 🔑 Passwort holen
db.ref("test/settings/memberPassword").on("value", snap=>{
  currentPassword = snap.val() || "";
});

// LOGIN
function login(){
  const pw=document.getElementById("pw").value;

 if(String(pw) === String(currentPassword)){
    if(localStorage.getItem("memberLoginTime") && currentPassword){
  start();
}
  }else{
    document.getElementById("error").innerText="Falscher Code";
  }
}

// AUTO LOGIN
if(localStorage.getItem("memberLoginTime")){
  start();
}

function start(){

  document.getElementById("login").style.display="none";

  // 👥 MEMBER REGISTRIEREN
  const memberId = localStorage.getItem("memberId") || Date.now().toString();
  localStorage.setItem("memberId", memberId);

  const ref = db.ref("test/members/"+memberId);
  ref.set(true);
  ref.onDisconnect().remove();

  // 🚫 KICK
  db.ref("test/settings/forceLogoutMembers").on("value", snap=>{
    const logoutTime = snap.val();
    const myLoginTime = localStorage.getItem("memberLoginTime");

    if(logoutTime && myLoginTime && logoutTime > myLoginTime){
      alert("Du wurdest gekickt!");
      localStorage.clear();
      location.reload();
    }
  });

  document.body.innerHTML = `
  <img src="logo.png" class="logo">

  <div class="container">

  <h2>👥 Mitglieder (Test)</h2>

  <div id="online"></div>

  <div>
    <textarea id="text" placeholder="Nachricht"></textarea>
    <select id="type">
      <option>Kritik</option>
      <option>Lob</option>
      <option>Frage</option>
      <option>Vorschlag</option>
    </select>
    <button onclick="send()">Senden</button>
  </div>

  <div id="stats"></div>

  <div class="legend">
    <span class="kritik">■ Kritik</span>
    <span class="lob">■ Lob</span>
    <span class="frage">■ Frage</span>
    <span class="vorschlag">■ Vorschlag</span>
  </div>

  <div>
    <button onclick="setFilter('all')">Alle</button>
    <button onclick="setFilter('Kritik')">Kritik</button>
    <button onclick="setFilter('Lob')">Lob</button>
    <button onclick="setFilter('Frage')">Frage</button>
    <button onclick="setFilter('Vorschlag')">Vorschlag</button>
  </div>

  <div id="chat"></div>

  </div>
  `;

  loadOnline();
  loadMessages();
}

// 👥 ONLINE
function loadOnline(){
  db.ref("test/admins").on("value", a=>{
    db.ref("test/members").on("value", m=>{
      document.getElementById("online").innerText =
        "👑 Vorstand: "+a.numChildren()+" | 👥 Mitglieder: "+m.numChildren();
    });
  });
}

// 🔥 MESSAGES
function loadMessages(){

  db.ref("test/feedback").on("child_added", snap=>{
    const msg={id:snap.key,...snap.val(),isNew:true};
    all.push(msg);

    setTimeout(()=>{msg.isNew=false;render();},15000);
    render();
  });

  db.ref("test/feedback").on("child_removed", snap=>{
    all = all.filter(m => m.id !== snap.key);
    render();
  });
}

// FILTER
function setFilter(f){
  currentFilter=f;
  render();
}

// RENDER
function render(){
  const chat=document.getElementById("chat");
  chat.innerHTML="";

  let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

  all.forEach(m=>{
    if(stats[m.type]!=undefined) stats[m.type]++;
  });

  document.getElementById("stats").innerText =
    `Kritik: ${stats.Kritik} | Lob: ${stats.Lob} | Frage: ${stats.Frage} | Vorschlag: ${stats.Vorschlag}`;

  let list=currentFilter==="all"?all:all.filter(m=>m.type===currentFilter);

  list.slice().reverse().forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type+(m.isNew?" blink":"");

    const time=new Date(m.time||Date.now()).toLocaleString();

div.innerHTML = `
  <b>${m.type}</b><br>
  ${m.text}<br>

  <div style="margin-top:8px;">
👍 ${m.likes || 0}
<button class="like" onclick="likeMsg('${m.id}')">👍</button>
  </div>
`;
}

// 📤 SENDEN + ARCHIV
function send(){
  const text=document.getElementById("text").value;
  const type=document.getElementById("type").value;

  if(!text) return;

const newMsg = {
  text,
  type,
  time: Date.now(),
  likes: 0
};

  // LIVE
  const ref = db.ref("test/feedback").push(newMsg);

// 👉 MIT ID speichern
db.ref("test/archive/"+ref.key).set({
  ...newMsg,
  status: "aktiv"
});

  document.getElementById("text").value="";
}

function likeMsg(id){

  const ref = db.ref("test/feedback/"+id+"/likes");

  ref.transaction(current => {
    return (current || 0) + 1;
  });

}
  
</script>

</body>
</html>
