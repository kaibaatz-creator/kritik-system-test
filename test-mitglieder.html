<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}
.container{max-width:700px;margin:auto;padding:10px;}

button{padding:10px;border:none;border-radius:10px;margin:5px;font-weight:bold;}

#text{
  width:90%;
  min-height:120px;
  border-radius:10px;
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="logo.png" class="logo">
  <h2>👥 Mitglieder Login</h2>
  <input id="pw">
  <button onclick="login()">Login</button>
  <div id="error" style="color:red;"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<img src="logo.png" class="logo">

<div class="container">

<h2>👥 Mitglieder</h2>

<div id="online"></div>

<textarea id="text" placeholder="Nachricht"></textarea><br>

<select id="type">
  <option>Kritik</option>
  <option>Lob</option>
  <option>Frage</option>
  <option>Vorschlag</option>
</select>

<button onclick="send()">Senden</button>

<div id="chat"></div>

</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPassword="";

// 🔑 PASSWORT LADEN
db.ref("test/settings/memberPassword").on("value", snap=>{
  currentPassword = snap.val() || "";
});

// 🔐 LOGIN
function login(){
  const pw = document.getElementById("pw").value;

  if(String(pw) === String(currentPassword)){
    localStorage.setItem("memberLoginTime", Date.now());
    start();
  }else{
    document.getElementById("error").innerText="Falscher Code";
  }
}

// 🔄 AUTO LOGIN
if(localStorage.getItem("memberLoginTime")){
  start();
}

// 🚀 START
function start(){

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  const memberId = localStorage.getItem("memberId") || Date.now().toString();
  localStorage.setItem("memberId", memberId);

  db.ref("test/members/"+memberId).set(true);
  db.ref("test/members/"+memberId).onDisconnect().remove();

  loadOnline();
  loadMessages();

  // 🚨 FORCE LOGOUT
  db.ref("test/settings/forceLogoutMembers").on("value", snap=>{
    const logoutTime = snap.val();
    const loginTime = localStorage.getItem("memberLoginTime");

    if(logoutTime && loginTime && logoutTime > loginTime){
      alert("Du wurdest ausgeloggt");
      localStorage.clear();
      location.reload();
    }
  });
}

// 👥 ONLINE
function loadOnline(){
  db.ref("test/admins").on("value", a=>{
    db.ref("test/members").on("value", m=>{
      document.getElementById("online").innerText =
        "👑 Vorstand: "+a.numChildren()+" | 👥 Mitglieder: "+m.numChildren();
    });
  });
}

// 📤 SENDEN
function send(){
  const text=document.getElementById("text").value;
  const type=document.getElementById("type").value;

  if(!text) return;

  const newMsg={
    text,
    type,
    time:Date.now()
  };

  const ref=db.ref("test/feedback").push(newMsg);

  db.ref("test/archive/"+ref.key).set({
    ...newMsg,
    status:"aktiv"
  });

  document.getElementById("text").value="";
}

// 🔥 MESSAGES
let all=[];

function loadMessages(){
  db.ref("test/feedback").on("child_added", snap=>{
    all.push(snap.val());
    render();
  });
}

// RENDER
function render(){
  const chat=document.getElementById("chat");
  chat.innerHTML="";

  all.slice().reverse().forEach(m=>{
    const div=document.createElement("div");
    div.innerHTML=`<b>${m.type}</b><br>${m.text}`;
    chat.appendChild(div);
  });
}
</script>

</body>
</html>
