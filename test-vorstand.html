<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand (Test)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}
.container{max-width:700px;margin:auto;padding:10px;}

button{padding:10px;border:none;border-radius:10px;margin:5px;font-weight:bold;cursor:pointer;}
.orange{background:orange;color:black;}
.red{background:red;color:white;}

.msg{background:#1e1e1e;margin:10px 0;padding:14px;border-radius:14px;text-align:left;}
.msg.Kritik{border-left:4px solid #ff4444;color:#ff4444;}
.msg.Lob{border-left:4px solid #00ff99;color:#00ff99;}
.msg.Frage{border-left:4px solid #00bfff;color:#00bfff;}
.msg.Vorschlag{border-left:4px solid #ffaa00;color:#ffaa00;}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container">

<h2>👑 Vorstand (Test)</h2>

<div id="online"></div>

<button class="orange" onclick="newPassword()">Mitglieder Passwort</button>
<button class="orange" onclick="newArchivePassword()">Archiv Passwort</button>

<div id="pwBox"></div>
<div id="archivePwBox"></div>

<button class="red" onclick="kickMembers()">Mitglieder kicken</button>
<button class="red" onclick="kickAdmins()">Vorstand kicken</button>

<div id="chat"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👥 ONLINE
function loadOnline(){
  db.ref("test/admins").on("value", a=>{
    db.ref("test/members").on("value", m=>{
      document.getElementById("online").innerText =
        "👑 Vorstand: "+a.numChildren()+" | 👥 Mitglieder: "+m.numChildren();
    });
  });
}

// 🔑 PASSWORT
function newPassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/memberPassword").set(pw);
  document.getElementById("pwBox").innerText="Code: "+pw;
}

// 📁 ARCHIV PW
function newArchivePassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/archivePassword").set(pw);
  db.ref("test/settings/archiveLogout").set(Date.now());
  document.getElementById("archivePwBox").innerText="Archiv Code: "+pw;
}

// 🚫 KICK
function kickMembers(){
  db.ref("test/settings/forceLogoutMembers").set(Date.now());
  db.ref("test/members").remove();
}

function kickAdmins(){
  db.ref("test/settings/forceLogoutAdmins").set(Date.now());
  db.ref("test/admins").remove();
}

loadOnline();
</script>

</body>
</html>
