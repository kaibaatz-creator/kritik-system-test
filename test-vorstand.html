<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand (Test)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}
.container{max-width:700px;margin:auto;padding:10px;}

button{padding:10px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:5px;}
.orange{background:orange;color:black;}
.red{background:red;color:white;}

.msg{background:#1e1e1e;margin:10px 0;padding:14px;border-radius:14px;text-align:left;}

.msg.Kritik{border-left:4px solid #ff4444;color:#ff4444;}
.msg.Lob{border-left:4px solid #00ff99;color:#00ff99;}
.msg.Frage{border-left:4px solid #00bfff;color:#00bfff;}
.msg.Vorschlag{border-left:4px solid #ffaa00;color:#ffaa00;}

.blink{animation:blink 1s infinite;}
@keyframes blink{
  0%{box-shadow:0 0 5px currentColor;}
  50%{box-shadow:0 0 20px currentColor;}
  100%{box-shadow:0 0 5px currentColor;}
}

.legend span{margin:0 8px;font-weight:bold;}
.kritik{color:#ff4444;}
.lob{color:#00ff99;}
.frage{color:#00bfff;}
.vorschlag{color:#ffaa00;}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <img src="logo.png" class="logo">
  <h2>👑 Vorstand Login</h2>
  <input id="pw" placeholder="Passwort">
  <button onclick="login()">Login</button>
  <div id="error" style="color:red;"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let all=[];
let adminId="";

// 🔐 LOGIN
function login(){
  const pw = document.getElementById("pw").value;

  if(pw === "1"){
    localStorage.setItem("adminLoginTime", Date.now());
    start();
  }else{
    document.getElementById("error").innerText="Falsches Passwort";
  }
}

// AUTO LOGIN
if(localStorage.getItem("adminLoginTime")){
  start();
}

// 🚀 START
function start(){

  document.getElementById("login").style.display="none";

  document.body.innerHTML = `
  <img src="logo.png" class="logo">

  <div class="container">

  <h2>👑 Vorstand (Test)</h2>

  <div id="online"></div>

  <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;">
    <div>
      <button class="orange" onclick="newPassword()">Mitglieder Passwort</button>
      <div id="pwBox"></div>
    </div>

    <div>
      <button class="orange" onclick="newArchivePassword()">Archiv Passwort</button>
      <div id="archivePwBox"></div>
    </div>
  </div>

  <br>

  <button class="red" onclick="kickMembers()">Mitglieder kicken</button>
  <button class="red" onclick="kickAdmins()">Vorstand kicken</button>

  <div class="legend">
    <span class="kritik">■ Kritik</span>
    <span class="lob">■ Lob</span>
    <span class="frage">■ Frage</span>
    <span class="vorschlag">■ Vorschlag</span>
  </div>

  <div id="chat"></div>

  </div>
  `;

  adminId = localStorage.getItem("adminId") || Date.now().toString();
  localStorage.setItem("adminId", adminId);

  const ref = db.ref("test/admins/"+adminId);
  ref.set(true);
  ref.onDisconnect().remove();

  // 🔥 KICK CHECK (JETZT FUNKTIONIERT ES)
  db.ref("test/settings/forceLogoutAdmins").on("value", snap=>{
    const logoutTime = snap.val();
    const myTime = localStorage.getItem("adminLoginTime");

    if(logoutTime && myTime && logoutTime > myTime){
      alert("Du wurdest gekickt!");
      localStorage.clear();
      location.reload();
    }
  });

  loadOnline();
  loadMessages();
}

// 👥 ONLINE
function loadOnline(){
  db.ref("test/admins").on("value", a=>{
    db.ref("test/members").on("value", m=>{
      document.getElementById("online").innerText =
        "👑 Vorstand: "+a.numChildren()+" | 👥 Mitglieder: "+m.numChildren();
    });
  });
}

// 🔑 PASSWÖRTER
function newPassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/memberPassword").set(pw);
  document.getElementById("pwBox").innerText="Code: "+pw;
}

function newArchivePassword(){
  const pw = Math.floor(1000 + Math.random()*9000);
  db.ref("test/settings/archivePassword").set(pw);
  document.getElementById("archivePwBox").innerText="Archiv Code: "+pw;
}

// 🚫 KICK
function kickMembers(){
  db.ref("test/settings/forceLogoutMembers").set(Date.now());
  db.ref("test/members").remove();
}

function kickAdmins(){
  db.ref("test/settings/forceLogoutAdmins").set(Date.now());
  db.ref("test/admins").remove();
}

// 🔥 MESSAGES
function loadMessages(){
  db.ref("test/feedback").on("child_added", snap=>{
    const msg={id:snap.key,...snap.val(),isNew:true};
    all.push(msg);

    setTimeout(()=>{msg.isNew=false;render();},15000);
    render();
  });

  db.ref("test/feedback").on("child_removed", snap=>{
    all = all.filter(m => m.id !== snap.key);
    render();
  });
}

// RENDER
function render(){
  const chat=document.getElementById("chat");
  chat.innerHTML="";

  all.slice().reverse().forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type+(m.isNew?" blink":"");

    div.innerHTML=`
      <b>${m.type}</b><br>
      ${m.text}<br>
      <button class="red" onclick="deleteMsg('${m.id}')">Löschen</button>
    `;

    chat.appendChild(div);
  });
}

// 🧹 DELETE
function deleteMsg(id){
  const pw = prompt("Passwort zum Löschen:");
  if(pw !== "2"){alert("Falsches Passwort");return;}

  db.ref("test/archive/"+id).update({
    status:"gelöscht",
    deletedAt:Date.now()
  });

  db.ref("test/feedback/"+id).remove();
}
</script>

</body>
</html>
