<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.logo{
  height:120px;
  margin:30px auto 10px;
  display:block;
}

h2{
  margin-bottom:20px;
  font-weight:500;
  opacity:0.9;
}

.grid{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
  max-width:600px;
  margin:auto;
}

.card{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:#1e1e1e;
  border-radius:20px;
  padding:25px;

  text-decoration:none;
  color:white;
  font-size:20px;
  font-weight:bold;

  box-shadow:0 0 10px rgba(0,0,0,0.6);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.card:active{
  transform:scale(0.96);
}

.left{
  display:flex;
  align-items:center;
  gap:15px;
}

.card svg{
  width:30px;
  height:30px;
}

.members{border-left:5px solid #00ff99;}
.admin{border-left:5px solid #ffaa00;}
.archive{border-left:5px solid #00bfff;}

.members svg{color:#00ff99;}
.admin svg{color:#ffaa00;}
.archive svg{color:#00bfff;}

.badge{
  background:#00ff99;
  color:black;
  font-size:12px;
  padding:4px 8px;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 0 10px #00ff99;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px #00ff99;}
  50%{box-shadow:0 0 15px #00ff99;}
  100%{box-shadow:0 0 5px #00ff99;}
}

.arrow{
  opacity:0.5;
  font-size:18px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>System starten</h2>

<div class="grid">

  <a href="mitglieder.html" class="card members">
    <div class="left">
      <i data-lucide="users"></i>
      <span id="membersCount">Mitglieder</span>
    </div>
    <div>
      <span class="badge">LIVE</span>
      <span class="arrow">→</span>
    </div>
  </a>

  <a href="vorstand.html" class="card admin">
    <div class="left">
      <i data-lucide="crown"></i>
      <span id="adminsCount">Vorstand</span>
    </div>
    <span class="arrow">→</span>
  </a>

  <a href="archiv.html" class="card archive">
    <div class="left">
      <i data-lucide="archive"></i>
      Archiv
    </div>
    <span class="arrow">→</span>
  </a>

</div>

<!-- Icons aktivieren -->
<script>
lucide.createIcons();
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Mitglieder live zählen
db.ref("test/members").on("value", snap=>{
  document.getElementById("membersCount").innerText =
    "Mitglieder (" + snap.numChildren() + " online)";
});

// Vorstand live zählen
db.ref("test/admins").on("value", snap=>{
  document.getElementById("adminsCount").innerText =
    "Vorstand (" + snap.numChildren() + " online)";
});
</script>

</body>
</html>
