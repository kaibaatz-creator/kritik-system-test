<script>
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("test/members").on("value", snap=>{
  document.getElementById("membersCount").innerText =
    "Mitglieder (" + snap.numChildren() + " online)";
});

db.ref("test/admins").on("value", snap=>{
  document.getElementById("adminsCount").innerText =
    "Vorstand (" + snap.numChildren() + " online)";
});
</script>
