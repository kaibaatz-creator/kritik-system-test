<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.logo{
  height:120px;
  margin:30px auto 10px;
  display:block;
}

h2{
  margin-bottom:20px;
  font-weight:500;
  opacity:0.9;
}

/* GRID */
.grid{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
  max-width:600px;
  margin:auto;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  justify-content:space-between;

  background:#1e1e1e;
  border-radius:20px;
  padding:25px;

  text-decoration:none;
  color:white;
  font-size:20px;
  font-weight:bold;

  box-shadow:0 0 10px rgba(0,0,0,0.6);
  transition:0.2s;
  position:relative;
}

/* Hover Effekt */
.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 20px rgba(255,255,255,0.1);
}

/* Klick Effekt */
.card:active{
  transform:scale(0.98);
}

/* LINKER TEIL */
.left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* ICON */
.card svg{
  width:30px;
  height:30px;
}

/* COLORS */
.members{border-left:5px solid #00ff99;}
.admin{border-left:5px solid #ffaa00;}
.archive{border-left:5px solid #00bfff;}

.members svg{color:#00ff99;}
.admin svg{color:#ffaa00;}
.archive svg{color:#00bfff;}

/* BADGE */
.badge{
  background:#00ff99;
  color:black;
  font-size:12px;
  padding:4px 8px;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 0 10px #00ff99;
}

/* kleiner Pfeil */
.arrow{
  opacity:0.5;
  font-size:18px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>System starten</h2>

<div class="grid">

  <a href="mitglieder.html" class="card members">
    <div class="left">
      <i data-lucide="users"></i>
      Mitglieder
    </div>
    <div>
      <span class="badge">LIVE</span>
      <span class="arrow">→</span>
    </div>
  </a>

  <a href="vorstand.html" class="card admin">
    <div class="left">
      <i data-lucide="crown"></i>
      Vorstand
    </div>
    <span class="arrow">→</span>
  </a>

  <a href="archiv.html" class="card archive">
    <div class="left">
      <i data-lucide="archive"></i>
      Archiv
    </div>
    <span class="arrow">→</span>
  </a>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
