<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

.logo{
  height:120px;
  margin:30px auto 10px;
  display:block;
}

h2{
  margin-bottom:20px;
  font-weight:500;
}

/* GRID */
.grid{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
  max-width:600px;
  margin:auto;
}

/* CARD */
.card{
  display:flex;
  align-items:center;
  gap:15px;

  background:#1e1e1e;
  border-radius:20px;
  padding:25px;

  text-decoration:none;
  color:white;
  font-size:20px;
  font-weight:bold;

  box-shadow:0 0 10px rgba(0,0,0,0.6);
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

/* ICON */
.card svg{
  width:28px;
  height:28px;
}

/* COLORS */
.members{border-left:5px solid #00ff99;}
.admin{border-left:5px solid #ffaa00;}
.archive{border-left:5px solid #00bfff;}

.members svg{color:#00ff99;}
.admin svg{color:#ffaa00;}
.archive svg{color:#00bfff;}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<h2>System starten</h2>

<div class="grid">

  <a href="mitglieder.html" class="card members">
    <i data-lucide="users"></i>
    Mitglieder
  </a>

  <a href="vorstand.html" class="card admin">
    <i data-lucide="crown"></i>
    Vorstand
  </a>

  <a href="archiv.html" class="card archive">
    <i data-lucide="archive"></i>
    Archiv
  </a>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
