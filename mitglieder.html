<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mitglieder</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h2>👥 Mitglieder</h2>

<input id="code" placeholder="Code">
<button onclick="login()">Login</button>

<div id="app" style="display:none;">
  <textarea id="text" placeholder="Nachricht"></textarea><br><br>

  <button onclick="send('Kritik')">Kritik</button>
  <button onclick="send('Lob')">Lob</button>
  <button onclick="send('Frage')">Frage</button>
  <button onclick="send('Vorschlag')">Vorschlag</button>

  <div id="liste"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "DEIN_API_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
});

const db = getDatabase(app);

window.login = async function() {
  const input = document.getElementById("code").value;

  const snap = await get(ref(db, "test/settings/memberPassword"));
  const pw = snap.val();

  if (input == pw) {
    document.getElementById("app").style.display = "block";
    load();
  } else {
    alert("Falscher Code");
  }
}

window.send = function(type) {
  const text = document.getElementById("text").value;

  push(ref(db, "test/feedback"), {
    text,
    type,
    time: Date.now()
  });

  document.getElementById("text").value = "";
}

function load() {
  onValue(ref(db, "test/feedback"), (snap) => {
    const data = snap.val();
    const liste = document.getElementById("liste");
    liste.innerHTML = "";

    for (let key in data) {
      const i = data[key];
      liste.innerHTML += `<div>${i.type}: ${i.text}</div>`;
    }
  });
}
</script>

</body>
</html>
