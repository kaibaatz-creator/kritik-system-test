<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;margin:0;}
.logo{height:150px;margin:20px auto;display:block;}

.msg{
  background:#1e1e1e;
  margin:12px auto;
  padding:14px;
  border-radius:14px;
  text-align:left;
  width:92%;
  max-width:700px;
}

.msg.Kritik{border-left:4px solid #ff4444;color:#ff4444;}
.msg.Lob{border-left:4px solid #00ff99;color:#00ff99;}
.msg.Frage{border-left:4px solid #00bfff;color:#00bfff;}
.msg.Vorschlag{border-left:4px solid #ffaa00;color:#ffaa00;}

textarea{
  width:92%;
  max-width:700px;
  margin:10px auto;
  display:block;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#111;
  color:white;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <img src="logo.png" class="logo">
  <h2>👥 Mitglieder Login</h2>
  <input id="pw" placeholder="Code">
  <button onclick="login()">Login</button>
  <div id="error" style="color:red;"></div>
</div>

<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPassword = "";
let all = [];
let selectedType = "Kritik";


// 🔥 PASSWORT LADEN (WICHTIG!)
db.ref("test/settings/memberPassword").on("value", snap=>{
  currentPassword = snap.val();
  console.log("PASSWORT:", currentPassword);
});


// 🔐 LOGIN
function login(){
  const pw = document.getElementById("pw").value;

  console.log("EINGABE:", pw);
  console.log("DB:", currentPassword);

  if(pw === String(currentPassword)){
    localStorage.setItem("memberLoginTime", Date.now());
    start();
  }else{
    document.getElementById("error").innerText="Falscher Code";
  }
}


// AUTO LOGIN
if(localStorage.getItem("memberLoginTime")) start();


// 🚀 START
function start(){

  document.getElementById("login").style.display="none";

  const memberId = localStorage.getItem("memberId") || Date.now().toString();
  localStorage.setItem("memberId", memberId);

  const ref = db.ref("test/members/"+memberId);
  ref.set(true);
  ref.onDisconnect().remove();

  document.getElementById("app").innerHTML = `
    <img src="logo.png" class="logo">
    <h2>👥 Mitglieder Live</h2>

    <textarea id="text" rows="4" placeholder="Nachricht"></textarea>

    <br>

    <button onclick="setType('Kritik')">Kritik</button>
    <button onclick="setType('Lob')">Lob</button>
    <button onclick="setType('Frage')">Frage</button>
    <button onclick="setType('Vorschlag')">Vorschlag</button>

    <br>

    <button onclick="send()">Senden</button>

    <div id="chat"></div>
  `;

  loadMessages();

  // 🔥 KICK CHECK
  db.ref("test/settings/forceLogoutMembers").on("value", snap=>{
    const logoutTime = snap.val();
    const myTime = localStorage.getItem("memberLoginTime");

    if(logoutTime && myTime && logoutTime > myTime){
      alert("Du wurdest gekickt!");
      localStorage.removeItem("memberLoginTime");
      location.reload();
    }
  });
}


// TYPE
function setType(type){
  selectedType = type;
}


// LOAD
function loadMessages(){
  db.ref("test/feedback").on("value", snap=>{
    all = [];
    snap.forEach(c=>{
      all.push(c.val());
    });
    render();
  });
}


// RENDER
function render(){
  const chat = document.getElementById("chat");
  chat.innerHTML="";

  all.slice().reverse().forEach(m=>{
    const div=document.createElement("div");
    div.className="msg "+m.type;

    div.innerHTML=`
      <b>${m.type}</b><br>
      ${m.text}
    `;

    chat.appendChild(div);
  });
}


// SEND
function send(){
  const text=document.getElementById("text").value;
  if(!text) return;

  const newMsg={
    text,
    type:selectedType,
    time:Date.now()
  };

  db.ref("test/feedback").push(newMsg);
  db.ref("test/archive").push({...newMsg,status:"aktiv"});

  document.getElementById("text").value="";
}
</script>

</body>
</html>
